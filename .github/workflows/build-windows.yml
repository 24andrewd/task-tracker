name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build EXE
        run: pyinstaller --onedir --windowed --name "Task Tracker" task_tracker.py --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskTracker-Windows
          path: dist/Task Tracker/
          retention-days: 30
